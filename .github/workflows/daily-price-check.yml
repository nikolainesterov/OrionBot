name: Daily Amazon price check

on:
  schedule:
    # 13:00 UTC = 7:00 AM Saskatoon time (CST, no DST).
    # Change "0 13" to "0 <hour_UTC>" to adjust.
    - cron: "0 13 * * *"
  workflow_dispatch: {}

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Wake up Render and wait until it responds
        # Render free services spin down after 15 min of no traffic.
        # Polls every 10s until the health endpoint returns 200.
        # The "|| true" on curl is required because bash -e (used by GitHub
        # Actions) exits the script immediately on any non-zero exit code —
        # including curl's exit code 28 (timeout). With "|| true", a timeout
        # just means STATUS stays "000" and the loop retries.
        run: |
          echo "Waiting for Render to wake up..."
          for i in $(seq 1 12); do
            STATUS=$(curl --silent --max-time 10 --write-out "%{http_code}" \
                         --output /dev/null "${{ secrets.RENDER_APP_URL }}/") || true
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Service is awake."
              break
            fi
            sleep 10
          done

      - name: Trigger daily price check
        # /check-prices returns 200 immediately (work runs in a background
        # thread), so this should complete in well under 15 seconds.
        run: |
          curl --fail --show-error --max-time 15 \
            "${{ secrets.RENDER_APP_URL }}/check-prices?token=${{ secrets.CRON_SECRET }}"
